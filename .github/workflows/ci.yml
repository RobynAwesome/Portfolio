name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify static assets exist
        run: |
          files=(
            "dist/index.html"
            "api/cv-files/computer-eng-student.pdf"
            "api/cv-files/fullstack-developer.pdf"
            "api/cv-files/web-developer.pdf"
            "api/cv-files/software-developer.pdf"
            "api/cv-files/frontend-backend-developer.pdf"
            "public/og-image.jpg"
            "public/favicon.ico"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            else
              echo "OK: $f"
            fi
          done
